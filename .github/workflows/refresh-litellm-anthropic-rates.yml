name: Refresh LiteLLM Anthropic rates

on:
  schedule:
    # Every Monday 06:00 UTC — picks up Anthropic price changes within
    # the week without spamming the repo.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Refresh vendored JSON
        run: |
          python autogpt_platform/backend/scripts/refresh_litellm_anthropic_rates.py

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-litellm-anthropic-rates
          delete-branch: true
          commit-message: "chore(backend/copilot): refresh vendored LiteLLM Anthropic rates"
          title: "chore(backend/copilot): refresh vendored LiteLLM Anthropic rates"
          body: |
            Auto-generated by `.github/workflows/refresh-litellm-anthropic-rates.yml`.

            Upstream source:
            https://raw.githubusercontent.com/BerriAI/litellm/main/litellm/model_prices_and_context_window_backup.json

            Reviewer checklist:
            - Diff contains only `litellm_anthropic_rates.json` changes.
            - Per-model `input_cost_per_token` / `output_cost_per_token` deltas line up with Anthropic's published prices.
            - No unexpected models removed (LiteLLM occasionally renames keys — confirm renames are intentional before merging).
          base: dev
